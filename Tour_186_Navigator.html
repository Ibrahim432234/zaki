  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 1rem; }
  .app { max-width: 480px; margin: 0 auto; }

  .header { background: #1a56db; border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; color: white; }
  .header-title { font-size: 13px; font-weight: 600; opacity: 0.8; letter-spacing: 0.05em; text-transform: uppercase; }
  .header-sub { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .header-pct { text-align: right; }
  .header-pct-num { font-size: 28px; font-weight: 700; line-height: 1; }
  .header-pct-label { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .progress-bar { background: #d1d5db; border-radius: 99px; height: 8px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a56db; border-radius: 99px; transition: width 0.4s ease; }

  .stop-card { background: white; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 2px solid #1a56db; }
  .stop-id { font-size: 12px; color: #6b7280; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stop-name { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; line-height: 1.25; }
  .stop-type { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
  .stop-address { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; font-size: 15px; color: #374151; line-height: 1.4; }
  .stop-address svg { flex-shrink: 0; margin-top: 2px; color: #1a56db; }

  .btn-nav { width: 100%; background: #1a56db; color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; transition: background 0.15s; }
  .btn-nav:hover { background: #1545b8; }
  .btn-nav:active { transform: scale(0.98); }

  .btn-done { width: 100%; background: #059669; color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; transition: background 0.15s; }
  .btn-done:hover { background: #047857; }
  .btn-done:active { transform: scale(0.98); }

  .btn-skip { width: 100%; background: transparent; color: #9ca3af; border: 1px solid #e5e7eb; border-radius: 12px; padding: 11px; font-size: 14px; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
  .btn-skip:hover { background: #f9fafb; color: #6b7280; }

  .next-preview { background: white; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .next-label { font-size: 12px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .next-name { font-size: 15px; font-weight: 600; color: #374151; }
  .next-addr { font-size: 13px; color: #9ca3af; margin-top: 2px; }

  .done-screen { text-align: center; padding: 4rem 1rem; }
  .done-icon { font-size: 72px; }
  .done-screen h2 { font-size: 24px; font-weight: 700; color: #111827; margin-top: 1rem; }

  .btn-restart { display: inline-flex; align-items: center; gap: 8px; background: #1a56db; color: white; border: none; border-radius: 12px; padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 2rem; }

let current = parseInt(localStorage.getItem('tour186_stop') || '0');

function mapsUrl(stop) {
  const q = encodeURIComponent(stop.street + ', ' + stop.plz + ' ' + stop.city + ', Deutschland');
  return 'https://www.google.com/maps/dir/?api=1&destination=' + q + '&travelmode=driving';
}

function save() {
  localStorage.setItem('tour186_stop', current);
}

function render() {
  const main = document.getElementById('main');

  if (current >= stops.length) {
    main.innerHTML = `
      <div class="done-screen">
        <div class="done-icon">✅</div>
        <h2>Tour abgeschlossen!</h2>
        <p>Alle ${stops.length} Stopps erledigt.</p>
        <button class="btn-restart" onclick="current=0;save();render()">↺ Tour neu starten</button>
      </div>`;
    return;
  }

  const s = stops[current];
  const next = stops[current + 1];
  const pct = Math.round((current / stops.length) * 100);

  main.innerHTML = `
    <div class="header">
      <div>
        <div class="header-title">Tour 186</div>
        <div class="header-sub">Stopp ${current + 1} von ${stops.length}</div>
      </div>
      <div class="header-pct">
        <div class="header-pct-num">${pct}%</div>
        <div class="header-pct-label">erledigt</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>

    <div class="stop-card">
      <div class="counter-badge">NR. ${s.id}</div>
      <div class="stop-name">${s.name}</div>
      <div class="stop-type">${s.type}</div>
      <div class="stop-address">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>${s.street}, ${s.plz} ${s.city}</span>
      </div>
      <button class="btn-nav" onclick="openMaps(${current})">
        🗺️ In Google Maps navigieren
      </button>
      <button class="btn-done" onclick="markDone()">
        ✅ Ziel erreicht — nächster Stopp
      </button>
      <button class="btn-skip" onclick="markDone()">Überspringen →</button>
    </div>

    ${next ? `
    <div class="next-preview">
      <div class="next-label">→ Nächster Stopp</div>
      <div class="next-name">${next.name}</div>
      <div class="next-addr">${next.street}, ${next.plz} ${next.city}</div>
    </div>` : `
    <div class="next-preview">
      <div class="next-label">🏁 Letzter Stopp</div>
      <div class="next-name">Danach ist die Tour abgeschlossen.</div>
    </div>`}
  `;
}

function openMaps(idx) {
  window.open(mapsUrl(stops[idx]), '_blank');
}

function markDone() {
  current++;
  save();
  render();
  if (current < stops.length) {
    setTimeout(() => openMaps(current), 300);
  }
}

render();
